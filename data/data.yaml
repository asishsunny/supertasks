# due: offset from today (negative = past, positive = future)
tasks:
  - { id: 1,  title: Update onboarding flow,    desc: Revamp first-run experience for new users,          assignee: 1, status: in_progress, priority: high,     due: -6 }
  - { id: 2,  title: Q2 roadmap review,         desc: Align team on priorities for next quarter,          assignee: 3, status: in_review,   priority: medium,   due: -1 }
  - { id: 3,  title: Customer interviews,        desc: Schedule and run five user feedback sessions,       assignee: 5, status: todo,        priority: medium,   due: 7 }
  - { id: 4,  title: "Fix billing bug #482",     desc: Null ref in payment callback causing failed charges, assignee: 4, status: in_progress, priority: critical, due: -8 }
  - { id: 5,  title: "Design QA — Settings",     desc: Verify settings page matches latest design specs,   assignee: 1, status: in_review,   priority: high,     due: 3 }
  - { id: 6,  title: Migrate analytics SDK,      desc: Switch from legacy tracker to new events API,       assignee: 2, status: todo,        priority: high,     due: 5 }
  - { id: 7,  title: Redesign landing page,      desc: New hero section and updated feature grid,          assignee: 5, status: in_progress, priority: medium,   due: 1 }
  - { id: 8,  title: Fix login bug,              desc: Session token not refreshing on mobile browsers,    assignee: 4, status: done,        priority: critical, due: -10 }
  - { id: 9,  title: Write API documentation,    desc: Document all public endpoints with examples,        assignee: 6, status: todo,        priority: low,      due: 15 }
  - { id: 10, title: Setup CI/CD pipeline,       desc: Configure GitHub Actions for staging deploys,       assignee: 2, status: in_progress, priority: high,     due: 12 }
  - { id: 11, title: User research interviews,   desc: Recruit participants and prepare script,            assignee: 3, status: todo,        priority: medium,   due: -3 }
  - { id: 12, title: Performance audit,          desc: Profile render times and bundle size,               assignee: 6, status: in_review,   priority: high,     due: 10 }
  - { id: 13, title: Auth token refresh,         desc: Implement silent refresh with retry logic,          assignee: 2, status: done,        priority: critical, due: -5 }
  - { id: 14, title: Mobile nav refactor,        desc: Replace drawer with bottom tab navigation,          assignee: 1, status: in_progress, priority: medium,   due: -2 }
  - { id: 15, title: Icon system audit,          desc: Catalog all icons and remove unused SVGs,           assignee: 5, status: todo,        priority: low,      due: 20 }
  - { id: 16, title: Sprint retrospective,       desc: Review velocity and action items from last sprint,  assignee: 3, status: done,        priority: low,      due: -5 }
  - { id: 17, title: DB schema migration,        desc: Add indexes and normalize user preferences table,   assignee: 4, status: in_review,   priority: critical, due: 4 }
  - { id: 18, title: Accessibility pass,         desc: Fix contrast ratios and add ARIA labels,            assignee: 6, status: todo,        priority: medium,   due: 8 }

priority_colors:
  low:      { tag_bg: tag/neutral/tag-neutral-bg, tag_text: tag/neutral/tag-neutral-text, tag_border: tag/neutral/tag-neutral-border, chart: tag/neutral/tag-neutral-icon }
  medium:   { tag_bg: tag/warning/tag-orange-bg, tag_text: tag/warning/tag-orange-text, tag_border: tag/warning/tag-orange-border, chart: tag/warning/tag-orange-icon }
  high:     { tag_bg: tag/error/tag-red-bg, tag_text: tag/error/tag-red-text, tag_border: tag/error/tag-red-border, chart: tag/error/tag-red-icon }
  critical: { tag_bg: tag/purple/tag-purple-bg, tag_text: tag/purple/tag-purple-text, tag_border: tag/purple/tag-purple-border, chart: tag/purple/tag-purple-icon }

status_colors:
  todo:        { tag_bg: tag/neutral/tag-neutral-bg, tag_text: tag/neutral/tag-neutral-text, dot: tag/neutral/tag-neutral-icon }
  in_progress: { tag_bg: tag/blue/tag-blue-bg, tag_text: tag/blue/tag-blue-text, dot: tag/blue/tag-blue-icon }
  in_review:   { tag_bg: tag/warning/tag-orange-bg, tag_text: tag/warning/tag-orange-text, dot: tag/warning/tag-orange-icon }
  done:        { tag_bg: tag/success/tag-green-bg, tag_text: tag/success/tag-green-text, dot: tag/success/tag-green-icon }

status_dot_icons:
  todo: square-grey-solid
  in_progress: square-blue-solid
  in_review: square-orange-solid
  done: square-green-solid

